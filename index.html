<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <title>Meowlang Interpreter</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto+Mono&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
  </head>
  <body>
    <div id="toolbar">
      <div id="title">🐈&nbsp;<a href="https://github.com/wixette/meowlang">Meowlang</a></div>
      <select id="examples" title="Load an example program">
        <option value="">-- Load an example --</option>
        <option value="examples/cat.meow">Cat</option>
        <option value="examples/hello.meow">Hello</option>
        <option value="examples/countdown.meow">Countdown</option>
        <option value="examples/sum.meow">Sum</option>
        <option value="examples/fibonacci.meow">Fibonacci</option>
      </select>
      <div id="run">Run</div>
      <div id="debug-switch-pane">
        Debug&nbsp;<input id="debug-switch" type="checkbox">
      </div>
    </div>
    <div id="editor">
      <div id="input">
        <textarea id="input-box" placeholder="Please enter a Meowlang program here, or load an example above..."></textarea>
      </div>
      <div id="output"></div>
    </div>
    <div id="debug"></div>
    <div id="doc"></div>
    <div id="footer">
      &copy; 2020-2026 <a href="https://github.com/wixette/meowlang">wixette</a>
    </div>

    <script type="module">
      import {runMeowLang} from './src/meowlang.js';

      const inputBox = document.getElementById('input-box');
      const output = document.getElementById('output');
      const debug = document.getElementById('debug');
      const debugSwitch = document.getElementById('debug-switch');

      // Load an example program into the editor when selected.
      document.getElementById('examples').addEventListener('change', async (e) => {
        const path = e.target.value;
        if (!path) return;
        try {
          const resp = await fetch(path);
          inputBox.value = await resp.text();
        } catch (err) {
          debug.innerHTML = `<span class="red">Failed to load example: ${err.message}</span>`;
        }
        e.target.value = '';
        inputBox.focus();
      });

      // Run the program currently in the editor.
      document.getElementById('run').addEventListener('click', () => {
        debug.innerHTML = '';
        output.innerHTML = '';
        runMeowLang(
            inputBox.value,
            (error) => {
              debug.innerHTML = `<span class="red">${error}</span>`;
            },
            () => {
              output.innerHTML += '<br>';
            },
            () => {
              output.innerHTML += '🐈';
            },
            (info) => {
              if (!debugSwitch.checked) return;
              debug.innerHTML +=
                  `<span class="list">[${info.meowList.join(', ')}]</span><br>`;
              if (info.ip != undefined) {
                debug.innerHTML +=
                    `<span>IP=</span><span class="blue">${info.ip}</span>` +
                    ` op=<span class="blue">${info.opname}</span>` +
                    ` operand=<span class="blue">${info.operand}</span><br>`;
              }
            });
      });
    </script>

    <script src="./libs/marked.min.js"></script>
    <script>
      // Render README.md as the language reference below the interpreter.
      fetch('./README.md')
          .then((resp) => resp.text())
          .then((content) => {
            document.getElementById('doc').innerHTML = marked(content);
          });
    </script>
  </body>
</html>
