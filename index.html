<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Meowlang Interpreter</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500&family=Roboto+Mono:wght@400;500&display=swap"
          rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons"
          rel="stylesheet">
    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/materialize/1.0.0/css/materialize.min.css">
    <link rel="stylesheet" href="css/style.css">
  </head>
  <body>

    <!-- Top app bar -->
    <nav>
      <div class="nav-wrapper">
        <a href="https://github.com/wixette/meowlang" class="brand-logo">
          🐈&nbsp;Meowlang
        </a>
        <ul class="right">
          <li><a href="index.zh.html" title="中文版">中文</a></li>
          <li>
            <a href="https://github.com/wixette/meowlang" title="Source on GitHub">
              <i class="material-icons">code</i>
            </a>
          </li>
        </ul>
      </div>
    </nav>

    <!-- Main content -->
    <div class="container main-content">

      <!-- Controls bar: examples selector · run · debug toggle -->
      <div class="controls-bar">
        <select id="examples" title="Load an example program">
          <option value="">Load an example…</option>
          <option value="examples/cat.meow">Cat</option>
          <option value="examples/hello.meow">Hello</option>
          <option value="examples/countdown.meow">Countdown</option>
          <option value="examples/sum.meow">Sum</option>
          <option value="examples/fibonacci.meow">Fibonacci</option>
        </select>
        <button id="run" class="btn">
          <i class="material-icons left">play_arrow</i>Run
        </button>
        <div class="switch-ctrl">
          <span class="switch-lbl">Debug</span>
          <div class="switch">
            <label>
              <input id="debug-switch" type="checkbox">
              <span class="lever"></span>
            </label>
          </div>
        </div>
      </div>

      <!-- Editor (left) and output (right) -->
      <div class="editor-row">
        <div class="card z-depth-1 editor-card">
          <textarea id="input-box"
            placeholder="Enter a Meowlang program here, or load an example above…"
          ></textarea>
        </div>
        <div id="output" class="card z-depth-1"></div>
      </div>

      <!-- Debug output (hidden when empty) -->
      <div id="debug"></div>

      <!-- Language reference rendered from README.md -->
      <div id="doc"></div>

    </div><!-- /.container -->

    <footer class="page-footer">
      <div class="footer-copyright">
        <div class="container">
          &copy; 2020-2026
          <a href="https://github.com/wixette/meowlang">wixette</a>
        </div>
      </div>
    </footer>

    <script src="./libs/marked.min.js"></script>

    <script type="module">
      import {runMeowLang} from './src/meowlang.js';

      const inputBox = document.getElementById('input-box');
      const output = document.getElementById('output');
      const debug = document.getElementById('debug');
      const debugSwitch = document.getElementById('debug-switch');

      // Load an example program into the editor when selected.
      document.getElementById('examples').addEventListener('change',
          async (e) => {
            const path = e.target.value;
            if (!path) return;
            try {
              const resp = await fetch(path);
              inputBox.value = await resp.text();
            } catch (err) {
              debug.innerHTML =
                  `<span class="debug-error">` +
                  `Failed to load example: ${err.message}</span>`;
            }
            e.target.value = '';
            inputBox.focus();
          });

      // Run the program currently in the editor.
      document.getElementById('run').addEventListener('click', () => {
        debug.innerHTML = '';
        output.innerHTML = '';
        runMeowLang(
            inputBox.value,
            (error) => {
              debug.innerHTML =
                  `<span class="debug-error">${error}</span>`;
            },
            () => {
              output.innerHTML += '<br>';
            },
            () => {
              output.innerHTML += '🐈';
            },
            (info) => {
              if (!debugSwitch.checked) return;
              debug.innerHTML +=
                  `<span class="debug-list">` +
                  `[${info.meowList.join(', ')}]</span><br>`;
              if (info.ip != undefined) {
                debug.innerHTML +=
                    `IP=<span class="debug-val">${info.ip}</span>` +
                    ` op=<span class="debug-val">${info.opname}</span>` +
                    ` operand=<span class="debug-val">` +
                    `${info.operand}</span><br>`;
              }
            });
      });
    </script>

    <script>
      // Render README.md as the language reference below the interpreter.
      fetch('./README.md')
          .then((resp) => resp.text())
          .then((content) => {
            document.getElementById('doc').innerHTML = marked(content);
          });
    </script>

  </body>
</html>
